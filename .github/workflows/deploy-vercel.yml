name: Deploy to Vercel

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll
        run: bundle exec jekyll build

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Create Vercel Output
        run: |
          mkdir -p .vercel/output
          echo '{"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}' > .vercel/project.json
          cp -r _site .vercel/output/static
          echo '{"version":3}' > .vercel/output/config.json

      - name: Verify Output
        run: |
          ls -la .vercel/
          ls -la .vercel/output/
          cat .vercel/project.json
          cat .vercel/output/config.json
          ls .vercel/output/static/ | head -20

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
