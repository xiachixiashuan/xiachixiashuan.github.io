name: Deploy to Vercel

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll
        run: bundle exec jekyll build

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Deploy to Vercel
        run: |
          DEPLOY_DIR=$(mktemp -d)
          mkdir -p "$DEPLOY_DIR/.vercel/output"
          echo '{"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}' > "$DEPLOY_DIR/.vercel/project.json"
          cp -r _site "$DEPLOY_DIR/.vercel/output/static"
          echo '{"version":3}' > "$DEPLOY_DIR/.vercel/output/config.json"
          cd "$DEPLOY_DIR"
          vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
