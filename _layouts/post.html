---
layout: default
---
<div class="container">
  <div class="post-page">
    <a href="{{ '/' | relative_url }}" class="back-link">&larr; 返回首页</a>

    <header class="post-page-header">
      <h1>{{ page.title }}</h1>
      <div class="post-page-meta">
        <span>{{ page.date | date: "%Y-%m-%d" }}</span>
        {% if page.categories.size > 0 %}
          <span>&middot;</span>
          <span>{{ page.categories | join: " / " }}</span>
        {% endif %}
      </div>
    </header>

    <article class="post-content">
      <nav id="toc" class="post-toc"></nav>
      {{ content }}
    </article>
  </div>
</div>

<script>
(function() {
  var article = document.querySelector('.post-content');
  var toc = document.getElementById('toc');
  var headings = article.querySelectorAll('h2, h3');
  if (headings.length < 2) { toc.style.display = 'none'; return; }

  var html = '<div class="toc-title">目录</div><ul>';
  headings.forEach(function(h, i) {
    var id = 'heading-' + i;
    h.id = id;
    var cls = h.tagName === 'H3' ? ' class="toc-sub"' : '';
    html += '<li' + cls + '><a href="#' + id + '">' + h.textContent + '</a></li>';
  });
  html += '</ul>';
  toc.innerHTML = html;
})();
</script>
